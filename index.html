<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomieJohnson — Invincible Edit Анимации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body.theme-dark {
            --bg: #000000;
            --surface: #0a0a0a;
            --card: #111111;
            --border: #ff003c;
            --text: #ffffff;
            --text-secondary: #888888;
            --accent: #ff003c;
            --accent-glow: rgba(255, 0, 60, 0.3);
            --gradient: linear-gradient(135deg, #ff003c, #00ff41);
            --input-bg: #1a1a1a;
        }

        body.theme-light {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #ff003c;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --accent: #ff003c;
            --gradient: linear-gradient(135deg, #ff003c, #e600ff);
            --input-bg: #f0f0f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* ========== АНИМАЦИИ INVINCIBLE STYLE ========== */
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: -2px 0 #ff003c, 2px 0 #00ff41; }
            20% { transform: translate(-2px, 2px); text-shadow: -2px 0 #ff003c; }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 #00ff41; }
            60% { transform: translate(2px, 2px); text-shadow: -2px 0 #ff003c; }
            80% { transform: translate(2px, -2px); text-shadow: 2px 0 #00ff41; }
            100% { transform: translate(0); text-shadow: -2px 0 #ff003c, 2px 0 #00ff41; }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-3px); }
            20%, 40%, 60%, 80% { transform: translateX(3px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.2); opacity: 1; text-shadow: 0 0 20px #ff003c; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes borderFlash {
            0%, 100% { border-color: var(--border); box-shadow: 0 0 0px var(--accent); }
            50% { border-color: #00ff41; box-shadow: 0 0 20px #00ff41; }
        }

        @keyframes heartExplode {
            0% { transform: scale(1); }
            50% { transform: scale(1.5); text-shadow: 0 0 30px #ff003c; }
            100% { transform: scale(1); }
        }

        @keyframes spinGlitch {
            0% { transform: rotate(0deg) scale(1); filter: hue-rotate(0deg); }
            50% { transform: rotate(180deg) scale(1.1); filter: hue-rotate(180deg); }
            100% { transform: rotate(360deg) scale(1); filter: hue-rotate(360deg); }
        }

        .glitch-text {
            animation: glitch 0.5s infinite;
        }

        /* Анимация появления элементов */
        .post-card {
            animation: slideUp 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .post-card:hover {
            animation: shake 0.3s ease;
        }

        .tiktok-slide {
            animation: fadeInScale 0.3s ease;
        }

        /* Анимация кнопок */
        .btn, .modal-btn, .action-btn, .nav-item, .top-icon, .fab {
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .btn:active, .modal-btn:active, .action-btn:active, .fab:active {
            transform: scale(0.92);
            animation: pulse 0.2s ease;
        }

        .nav-item:active {
            transform: scale(0.95);
        }

        /* Heart анимация при лайке */
        .heart-animation {
            position: fixed;
            pointer-events: none;
            font-size: 48px;
            z-index: 9999;
            animation: heartExplode 0.5s ease-out forwards;
        }

        /* Модалки с анимацией */
        .custom-modal.active .modal-card {
            animation: slideUp 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* Индикатор паузы с анимацией */
        .pause-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            background: rgba(0,0,0,0.7);
            border-radius: 80px;
            padding: 16px;
            pointer-events: none;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
            backdrop-filter: blur(8px);
            border: 2px solid var(--accent);
        }

        .pause-indicator.show {
            opacity: 1;
            animation: pulse 0.3s ease;
        }

        /* Лента с анимацией */
        .tiktok-slider {
            height: 100%;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }

        /* Пульсирующий бордер у активного элемента */
        .nav-item.active {
            animation: borderFlash 1s infinite;
        }

        /* Анимация загрузки */
        @keyframes loadingPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .loading {
            animation: loadingPulse 1s infinite;
        }

        /* FAB анимация */
        .fab {
            animation: slideUp 0.5s ease, pulse 2s infinite;
        }

        /* Топ бар анимация */
        .top-bar {
            animation: slideDown 0.4s ease;
        }

        /* Счетчики анимация при изменении */
        .stat-value {
            transition: all 0.2s;
        }

        .stat-value:active {
            transform: scale(1.2);
            color: #00ff41;
        }

        /* Анимация для аватара */
        .post-avatar, .profile-avatar-large {
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .post-avatar:active, .profile-avatar-large:active {
            transform: scale(0.95) rotate(5deg);
        }

        /* Глитч эффект при ховере на посты (на мобиле по клику) */
        @keyframes glitchPost {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, 2px); }
            100% { transform: translate(0); }
        }

        .post-card:active {
            animation: glitchPost 0.15s ease;
        }

        /* Эффект ряби */
        .ripple {
            position: relative;
            overflow: hidden;
        }

        .ripple:after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10);
            opacity: 0;
            transition: transform .3s, opacity .5s;
        }

        .ripple:active:after {
            transform: scale(0);
            opacity: 0.3;
            transition: 0s;
        }
    </style>
</head>
<body class="theme-dark">

<!-- МОДАЛКИ -->
<div class="custom-modal" id="postModal">
    <div class="modal-card">
        <h3 class="glitch-text">📝 НОВЫЙ ПОСТ</h3>
        <textarea id="postContentInput" placeholder="Что думаешь?"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn ripple" id="submitPostBtn">ОПУБЛИКОВАТЬ</button>
            <button class="modal-btn modal-btn-outline ripple" id="closePostModalBtn">ОТМЕНА</button>
        </div>
    </div>
</div>

<div class="custom-modal" id="tiktokModal">
    <div class="modal-card">
        <h3 class="glitch-text">🎵 НОВЫЙ ТИКТОК</h3>
        <div class="btn ripple" id="selectVideoBtn" style="margin-bottom:12px">📹 ВЫБРАТЬ ВИДЕО</div>
        <input type="text" id="tiktokCaptionInput" placeholder="Описание...">
        <div class="modal-buttons">
            <button class="modal-btn ripple" id="submitTiktokBtn">ЗАЛИТЬ</button>
            <button class="modal-btn modal-btn-outline ripple" id="closeTiktokModalBtn">ОТМЕНА</button>
        </div>
    </div>
    <input type="file" id="tiktokFileInput" accept="video/*">
</div>

<div class="custom-modal" id="editUsernameModal">
    <div class="modal-card">
        <h3 class="glitch-text">✏️ СМЕНИТЬ НИК</h3>
        <input type="text" id="newUsernameInput" placeholder="Новый никнейм">
        <div class="modal-buttons">
            <button class="modal-btn ripple" id="saveUsernameBtn">СОХРАНИТЬ</button>
            <button class="modal-btn modal-btn-outline ripple" id="closeUsernameModalBtn">ОТМЕНА</button>
        </div>
    </div>
</div>

<div class="custom-modal" id="alertModal">
    <div class="modal-card">
        <h3 id="alertTitle" class="glitch-text">⚠️</h3>
        <p id="alertMessage" style="margin-bottom:20px"></p>
        <button class="modal-btn ripple" id="alertCloseBtn">ПОНЯТНО</button>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div class="app-container" style="display:flex; flex-direction:column; height:100vh">
    <div class="top-bar">
        <div class="top-logo glitch-text">🔥 HJ — INVINCIBLE EDIT</div>
        <div class="top-icons">
            <div class="top-icon ripple" id="topProfileBtn">👤</div>
            <div class="top-icon ripple" id="topSettingsBtn">⚙️</div>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="page" id="tiktokPage">
            <div class="tiktok-wrapper" id="tiktokWrapper">
                <div class="tiktok-slider" id="tiktokSlider"></div>
                <div class="pause-indicator" id="pauseIndicator">⏸️</div>
            </div>
        </div>

        <div class="page" id="feedPage">
            <div id="postsFeed"></div>
        </div>

        <div class="page" id="profilePage">
            <div id="profileContent"></div>
        </div>

        <div class="page" id="dmPage">
            <div id="dmContent"></div>
        </div>

        <div class="page" id="settingsPage">
            <div id="settingsContent"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item ripple" data-page="tiktok"><span class="nav-icon">🎵</span><span>ДЖОНСОН ВИДЕОС</span></div>
        <div class="nav-item ripple" data-page="feed"><span class="nav-icon">📰</span><span>ЛЕНТА</span></div>
        <div class="nav-item ripple" data-page="dm"><span class="nav-icon">💬</span><span>ЛИЧКА</span></div>
    </div>
</div>

<div class="fab ripple" id="fabBtn">+</div>

<input type="file" id="avatarInput" accept="image/*" style="display:none">

<script>
    // ========== ПОЛЬЗОВАТЕЛИ ==========
    let users = JSON.parse(localStorage.getItem('hj_users')) || {};
    let currentSession = localStorage.getItem('hj_session');

    function saveUsers() { localStorage.setItem('hj_users', JSON.stringify(users)); }
    function hashPassword(pwd) { return btoa(pwd + "hj_salt"); }

    function register(email, username, password) {
        if (!email.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/)) return "Некорректная почта";
        if (!username || username.length < 3) return "Логин минимум 3 символа";
        if (!password || password.length < 6) return "Пароль минимум 6 символов";
        if (users[email]) return "Почта уже занята";
        if (Object.values(users).find(u => u.username === username)) return "Логин уже занят";
        users[email] = {
            email: email,
            username: username,
            password: hashPassword(password),
            avatar: null,
            friends: [],
            friendRequests: [],
            dms: {},
            createdAt: Date.now()
        };
        saveUsers();
        return null;
    }

    function login(email, password) {
        const user = users[email];
        if (!user) return "Пользователь не найден";
        if (user.password !== hashPassword(password)) return "Неверный пароль";
        currentSession = email;
        localStorage.setItem('hj_session', currentSession);
        return null;
    }

    function getCurrentUser() { return currentSession ? users[currentSession] : null; }
    function updateUserData(data) { if (currentSession && users[currentSession]) { users[currentSession] = { ...users[currentSession], ...data }; saveUsers(); } }
    function logout() { localStorage.removeItem('hj_session'); currentSession = null; }

    // ========== ДАННЫЕ ==========
    let posts = JSON.parse(localStorage.getItem('hj_posts')) || [];
    let tiktoks = JSON.parse(localStorage.getItem('hj_tiktoks')) || [];
    let likedPosts = new Set(JSON.parse(localStorage.getItem('hj_liked_posts')) || []);
    let likedTiktoks = new Set(JSON.parse(localStorage.getItem('hj_liked_tiktoks')) || []);
    let currentPage = "feed";
    let selectedDmFriend = null;
    let currentTheme = localStorage.getItem('hj_theme') || 'dark';
    let currentProfileTab = "posts";
    let currentTiktokIndex = 0;
    let touchStartY = 0;

    function saveAppData() {
        localStorage.setItem('hj_posts', JSON.stringify(posts));
        localStorage.setItem('hj_tiktoks', JSON.stringify(tiktoks));
        localStorage.setItem('hj_liked_posts', JSON.stringify([...likedPosts]));
        localStorage.setItem('hj_liked_tiktoks', JSON.stringify([...likedTiktoks]));
    }

    function showAlert(message) {
        document.getElementById('alertMessage').innerText = message;
        document.getElementById('alertModal').classList.add('active');
    }

    // Анимация сердечка при лайке
    function showHeartAnimation(x, y) {
        const heart = document.createElement('div');
        heart.className = 'heart-animation';
        heart.innerHTML = '❤️';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 500);
    }

    // ========== ПОСТЫ ==========
    function openPostModal() { document.getElementById('postModal').classList.add('active'); }
    function closePostModal() { document.getElementById('postModal').classList.remove('active'); document.getElementById('postContentInput').value = ''; }

    function createPost() {
        const content = document.getElementById('postContentInput').value.trim();
        if (!content) { showAlert("Напиши что-нибудь"); return; }
        const user = getCurrentUser();
        posts.unshift({
            id: Date.now(),
            userId: user.email,
            username: user.username,
            avatar: user.avatar,
            content: content,
            timestamp: new Date().toLocaleString(),
            likes: 0
        });
        saveAppData();
        closePostModal();
        renderFeed();
        switchPage('feed');
    }

    function likePost(id, event) {
        const p = posts.find(x => x.id == id);
        if (likedPosts.has(id)) { likedPosts.delete(id); p.likes--; }
        else { 
            likedPosts.add(id); 
            p.likes++;
            if (event) {
                const rect = event.target.getBoundingClientRect();
                showHeartAnimation(rect.left + rect.width/2, rect.top + rect.height/2);
            }
        }
        saveAppData();
        renderFeed();
    }

    function renderFeed() {
        const container = document.getElementById('postsFeed');
        if (!container) return;
        if (!posts.length) { container.innerHTML = '<div style="text-align:center;padding:40px"><button class="btn ripple" id="emptyFeedBtn">📝 ПЕРВЫЙ ПОСТ</button></div>'; document.getElementById('emptyFeedBtn')?.addEventListener('click', openPostModal); return; }
        container.innerHTML = posts.map(p => `
            <div class="post-card">
                <div class="post-header">
                    <div class="post-avatar ripple">${p.avatar ? `<img src="${p.avatar}">` : '👤'}</div>
                    <div><div class="post-username">${escapeHtml(p.username)}</div><div class="post-time">${p.timestamp}</div></div>
                </div>
                <div class="post-content">${escapeHtml(p.content)}</div>
                <div class="post-actions">
                    <button class="action-btn ripple" onclick="likePost(${p.id}, event)">❤️ ${p.likes}</button>
                </div>
            </div>
        `).join('');
    }

    // ========== ТИКТОК ==========
    function pauseAllVideos() {
        document.querySelectorAll('.tiktok-video').forEach(video => { video.pause(); });
    }

    function playCurrentVideo() {
        const currentVideo = document.getElementById(`tiktokVideo_${tiktoks[currentTiktokIndex]?.id}`);
        if (currentVideo) { currentVideo.play().catch(e => console.log()); }
    }

    function toggleVideoPause(video, event) {
        event.stopPropagation();
        const indicator = document.getElementById('pauseIndicator');
        if (video.paused) {
            video.play();
            if (indicator) { indicator.innerHTML = '▶️'; indicator.classList.add('show'); setTimeout(() => indicator.classList.remove('show'), 500); }
        } else {
            video.pause();
            if (indicator) { indicator.innerHTML = '⏸️'; indicator.classList.add('show'); setTimeout(() => indicator.classList.remove('show'), 500); }
        }
    }

    function renderTiktokFeed() {
        const container = document.getElementById('tiktokSlider');
        if (!container) return;
        if (!tiktoks.length) { 
            container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center"><button class="btn ripple" id="emptyTiktokBtn">🎵 ДОБАВИТЬ ВИДЕО</button></div>'; 
            document.getElementById('emptyTiktokBtn')?.addEventListener('click', openTiktokModal);
            return;
        }
        
        container.innerHTML = tiktoks.map((t, idx) => `
            <div class="tiktok-slide" data-index="${idx}">
                <video src="${t.videoUrl}" class="tiktok-video" loop playsinline id="tiktokVideo_${t.id}"></video>
                <div class="tiktok-overlay">
                    <div class="tiktok-username">${escapeHtml(t.username)}</div>
                    <div class="tiktok-caption">${escapeHtml(t.caption || '')}</div>
                </div>
                <div class="tiktok-actions">
                    <div class="tiktok-action ripple" onclick="event.stopPropagation(); likeTiktok(${t.id}, event)">
                        <div class="tiktok-action-icon ${likedTiktoks.has(t.id) ? 'heart-active' : ''}" style="font-size:28px">${likedTiktoks.has(t.id) ? '❤️' : '♡'}</div>
                        <div>${t.likes || 0}</div>
                    </div>
                </div>
            </div>
        `).join('');
        
        updateSliderPosition();
        
        setTimeout(() => {
            pauseAllVideos();
            playCurrentVideo();
            document.querySelectorAll('.tiktok-video').forEach(video => {
                video.onclick = (e) => toggleVideoPause(video, e);
            });
        }, 100);
        
        setupSwipe();
    }

    function updateSliderPosition() {
        const slider = document.getElementById('tiktokSlider');
        if (slider) slider.style.transform = `translateY(-${currentTiktokIndex * 100}%)`;
    }

    function setupSwipe() {
        const wrapper = document.getElementById('tiktokWrapper');
        if (!wrapper) return;
        
        const newWrapper = wrapper.cloneNode(true);
        wrapper.parentNode.replaceChild(newWrapper, wrapper);
        
        const freshSlider = document.getElementById('tiktokSlider');
        const freshWrapper = document.getElementById('tiktokWrapper');
        
        if (!freshWrapper) return;
        
        freshWrapper.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; });
        freshWrapper.addEventListener('touchmove', (e) => { e.preventDefault(); });
        freshWrapper.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diff) < 50) return;
            if (diff > 0 && currentTiktokIndex > 0) { currentTiktokIndex--; }
            else if (diff < 0 && currentTiktokIndex < tiktoks.length - 1) { currentTiktokIndex++; }
            else { return; }
            updateSliderPosition();
            pauseAllVideos();
            playCurrentVideo();
        });
    }

    function likeTiktok(id, event) {
        const t = tiktoks.find(x => x.id == id);
        if (likedTiktoks.has(id)) { likedTiktoks.delete(id); t.likes--; }
        else { 
            likedTiktoks.add(id); 
            t.likes++;
            if (event) {
                const rect = event.target.getBoundingClientRect();
                showHeartAnimation(rect.left + rect.width/2, rect.top + rect.height/2);
            }
        }
        saveAppData();
        renderTiktokFeed();
    }

    function openTiktokModal() { document.getElementById('tiktokModal').classList.add('active'); }
    function closeTiktokModal() { document.getElementById('tiktokModal').classList.remove('active'); document.getElementById('tiktokCaptionInput').value = ''; document.getElementById('tiktokFileInput').value = ''; window.pendingTiktok = null; }

    document.getElementById('selectVideoBtn').onclick = () => document.getElementById('tiktokFileInput').click();
    document.getElementById('tiktokFileInput').onchange = (e) => {
        if (e.target.files[0]) {
            const reader = new FileReader();
            reader.onload = (ev) => { window.pendingTiktok = ev.target.result; showAlert("Видео готово!"); };
            reader.readAsDataURL(e.target.files[0]);
        }
    };
    document.getElementById('submitTiktokBtn').onclick = () => {
        if (!window.pendingTiktok) { showAlert("Выбери видео"); return; }
        const user = getCurrentUser();
        tiktoks.unshift({
            id: Date.now(),
            userId: user.email,
            username: user.username,
            avatar: user.avatar,
            videoUrl: window.pendingTiktok,
            caption: document.getElementById('tiktokCaptionInput').value,
            likes: 0
        });
        saveAppData();
        closeTiktokModal();
        currentTiktokIndex = 0;
        renderTiktokFeed();
        renderProfile();
        if (currentPage === 'tiktok') switchPage('tiktok');
    };

    // ========== ПРОФИЛЬ ==========
    function renderProfile() {
        const user = getCurrentUser();
        if (!user) return;
        const container = document.getElementById('profileContent');
        container.innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar-large ripple" id="profileAvatarClick">
                    ${user.avatar ? `<img src="${user.avatar}">` : '👤'}
                </div>
                <h3 class="glitch-text">${escapeHtml(user.username)}</h3>
                <div class="profile-stats">
                    <div><div class="stat-value">${tiktoks.filter(t => t.userId === user.email).length}</div><div class="stat-label">ВИДЕО</div></div>
                    <div><div class="stat-value">${posts.filter(p => p.userId === user.email).length}</div><div class="stat-label">ПОСТОВ</div></div>
                    <div><div class="stat-value">${user.friends?.length || 0}</div><div class="stat-label">ДРУЗЕЙ</div></div>
                </div>
                <button class="btn ripple" id="editProfileUsernameBtn">✏️ СМЕНИТЬ НИК</button>
            </div>
            <div class="profile-tabs">
                <div class="profile-tab ${currentProfileTab === 'posts' ? 'active' : ''} ripple" data-tab="posts">📝 МОИ ПОСТЫ</div>
                <div class="profile-tab ${currentProfileTab === 'tiktoks' ? 'active' : ''} ripple" data-tab="tiktoks">🎵 МОИ ВИДЕО</div>
            </div>
            <div id="profileTabContent"></div>
        `;
        
        document.getElementById('profileAvatarClick')?.addEventListener('click', () => document.getElementById('avatarInput').click());
        document.getElementById('editProfileUsernameBtn')?.addEventListener('click', () => document.getElementById('editUsernameModal').classList.add('active'));
        document.querySelectorAll('.profile-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentProfileTab = tab.dataset.tab;
                renderProfileTab();
                document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
        renderProfileTab();
    }

    function renderProfileTab() {
        const user = getCurrentUser();
        const container = document.getElementById('profileTabContent');
        if (!container) return;
        
        if (currentProfileTab === 'posts') {
            const userPosts = posts.filter(p => p.userId === user.email);
            if (!userPosts.length) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">📭 НЕТ ПОСТОВ</div>'; return; }
            container.innerHTML = userPosts.map(p => `
                <div class="post-card">
                    <div class="post-content">${escapeHtml(p.content)}</div>
                    <div style="font-size:11px;color:var(--text-secondary);margin-top:8px">❤️ ${p.likes} • ${p.timestamp}</div>
                </div>
            `).join('');
        } else {
            const userTiktoks = tiktoks.filter(t => t.userId === user.email);
            if (!userTiktoks.length) { container.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary)">🎵 НЕТ ВИДЕО</div>'; return; }
            container.innerHTML = userTiktoks.map(t => `
                <div style="background:var(--card);border-radius:16px;margin-bottom:12px;padding:12px;display:flex;gap:12px;align-items:center;animation:slideUp 0.3s ease">
                    <video src="${t.videoUrl}" style="width:70px;height:90px;border-radius:12px;object-fit:cover"></video>
                    <div><div>${escapeHtml(t.caption || 'без описания')}</div><div style="font-size:11px;color:var(--text-secondary)">❤️ ${t.likes}</div></div>
                </div>
            `).join('');
        }
    }

    function changeAvatar() {
        const input = document.getElementById('avatarInput');
        input.onchange = (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    updateUserData({ avatar: ev.target.result });
                    renderProfile();
                    renderFeed();
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        };
        input.click();
    }

    function saveUsername() {
        const newName = document.getElementById('newUsernameInput').value.trim();
        if (!newName) { showAlert("Введите ник"); return; }
        if (newName.length < 3) { showAlert("Минимум 3 символа"); return; }
        updateUserData({ username: newName });
        document.getElementById('editUsernameModal').classList.remove('active');
        document.getElementById('newUsernameInput').value = '';
        renderProfile();
        renderFeed();
        renderTiktokFeed();
    }

    // ========== ЛИЧКА ==========
    function renderDM() {
        const user = getCurrentUser();
        const container = document.getElementById('dmContent');
        container.innerHTML = `
            <div id="dmFriendsList"></div>
            <div class="dm-chat-area" id="dmChatArea">
                <div class="dm-messages-list" id="dmMessagesList"></div>
                <div class="dm-input-area">
                    <input type="text" id="dmMessageInput" placeholder="Сообщение...">
                    <button class="btn ripple" id="dmSendBtn">📨</button>
                </div>
            </div>
        `;
        
        const friendsDiv = document.getElementById('dmFriendsList');
        let html = `<button class="btn ripple" style="width:100%;margin-bottom:8px" id="searchFriendBtn">➕ НАЙТИ ДРУГА</button>`;
        
        if (user.friendRequests?.length) {
            html += `<div style="padding:8px;background:var(--card);border-radius:16px;margin-bottom:8px"><strong>📨 ЗАЯВКИ:</strong>`;
            user.friendRequests.forEach(r => {
                html += `<div style="display:flex;justify-content:space-between;padding:8px"><span>${escapeHtml(r)}</span><div><button class="btn ripple" style="padding:4px 12px" onclick="acceptFriend('${escapeHtml(r)}')">✅</button><button class="btn ripple" style="padding:4px 12px" onclick="rejectFriend('${escapeHtml(r)}')">❌</button></div></div>`;
            });
            html += `</div>`;
        }
        
        html += `<div style="padding:8px"><strong>👥 ДРУЗЬЯ (${user.friends?.length || 0})</strong></div>`;
        (user.friends || []).forEach(f => {
            html += `<div class="dm-friend-item ripple" onclick="openDm('${escapeHtml(f)}')"><div class="post-avatar" style="width:40px;height:40px">👤</div><div>${escapeHtml(f)}</div></div>`;
        });
        friendsDiv.innerHTML = html;
        
        document.getElementById('dmSendBtn')?.addEventListener('click', sendDm);
        document.getElementById('dmMessageInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendDm(); });
        document.getElementById('searchFriendBtn')?.addEventListener('click', () => {
            const name = prompt("Введите ник друга:");
            if (name && name !== user.username) searchUser(name);
        });
        if (selectedDmFriend) renderDmChat();
    }

    function searchUser(username) {
        const user = getCurrentUser();
        if (user.friends?.includes(username)) { showAlert("Уже друг"); return; }
        if (user.friendRequests?.includes(username)) { showAlert("Заявка уже отправлена"); return; }
        updateUserData({ friendRequests: [...(user.friendRequests || []), username] });
        renderDM();
        showAlert(`Заявка отправлена ${username}`);
    }

    function acceptFriend(username) {
        const user = getCurrentUser();
        updateUserData({ 
            friendRequests: (user.friendRequests || []).filter(f => f !== username),
            friends: [...(user.friends || []), username],
            dms: { ...(user.dms || {}), [username]: [] }
        });
        renderDM();
        renderProfile();
    }

    function rejectFriend(username) {
        const user = getCurrentUser();
        updateUserData({ friendRequests: (user.friendRequests || []).filter(f => f !== username) });
        renderDM();
    }

    function openDm(friend) {
        selectedDmFriend = friend;
        renderDmChat();
    }

    function sendDm() {
        const user = getCurrentUser();
        if (!selectedDmFriend) { showAlert("Выбери друга"); return; }
        const input = document.getElementById('dmMessageInput');
        const text = input?.value.trim();
        if (!text) return;
        if (!user.dms) user.dms = {};
        if (!user.dms[selectedDmFriend]) user.dms[selectedDmFriend] = [];
        user.dms[selectedDmFriend].push({ from: user.username, text: text, time: new Date().toLocaleTimeString() });
        updateUserData({ dms: user.dms });
        if (input) input.value = '';
        renderDmChat();
    }

    function renderDmChat() {
        const user = getCurrentUser();
        const messagesDiv = document.getElementById('dmMessagesList');
        if (!selectedDmFriend) {
            if (messagesDiv) messagesDiv.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px">ВЫБЕРИ ДРУГА</div>';
            return;
        }
        const msgs = user.dms?.[selectedDmFriend] || [];
        if (!msgs.length) {
            if (messagesDiv) messagesDiv.innerHTML = '<div style="text-align:center;color:var(--text-secondary);padding:40px">НЕТ СООБЩЕНИЙ</div>';
        } else {
            if (messagesDiv) messagesDiv.innerHTML = msgs.map(m => `<div class="dm-message ${m.from === user.username ? 'own' : ''}"><div>${escapeHtml(m.text)}</div><div style="font-size:10px;opacity:0.7">${m.time}</div></div>`).join('');
        }
        if (messagesDiv) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    // ========== НАСТРОЙКИ ==========
    function renderSettings() {
        const user = getCurrentUser();
        const container = document.getElementById('settingsContent');
        container.innerHTML = `
            <div class="settings-item">
                <span>👤 ${escapeHtml(user.username)}</span>
                <button class="btn btn-outline ripple" id="settingsEditUsernameBtn" style="padding:6px 12px">ИЗМЕНИТЬ</button>
            </div>
            <div class="settings-item">
                <span>🌙 ТЕМНАЯ ТЕМА</span>
                <div class="theme-switch ${currentTheme === 'dark' ? 'active' : ''}" id="themeSwitchBtn">
                    <div class="theme-switch-knob"></div>
                </div>
            </div>
            <div class="settings-item">
                <span>🚪 ВЫЙТИ</span>
                <button class="btn ripple" id="logoutBtn" style="background:#ff003c;padding:6px 12px">ВЫХОД</button>
            </div>
        `;
        document.getElementById('settingsEditUsernameBtn')?.addEventListener('click', () => document.getElementById('editUsernameModal').classList.add('active'));
        document.getElementById('themeSwitchBtn')?.addEventListener('click', toggleTheme);
        document.getElementById('logoutBtn')?.addEventListener('click', () => { logout(); location.reload(); });
    }

    // ========== НАВИГАЦИЯ ==========
    function switchPage(pageId) {
        currentPage = pageId;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`${pageId}Page`).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(item => {
            if (item.dataset.page === pageId) item.classList.add('active');
            else item.classList.remove('active');
        });
        
        if (pageId === 'tiktok') { 
            currentTiktokIndex = 0;
            renderTiktokFeed(); 
        }
        if (pageId === 'feed') renderFeed();
        if (pageId === 'profile') renderProfile();
        if (pageId === 'dm') renderDM();
        if (pageId === 'settings') renderSettings();
    }

    function toggleTheme() {
        currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.body.className = `theme-${currentTheme}`;
        localStorage.setItem('hj_theme', currentTheme);
    }

    function escapeHtml(s) {
        if (!s) return '';
        return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }

    // ========== АВТОРИЗАЦИЯ ==========
    function showAuthScreen() {
        const email = prompt("EMAIL ДЛЯ ВХОДА/РЕГИСТРАЦИИ:");
        if (!email) return;
        const username = prompt("ЛОГИН:");
        if (!username) return;
        const password = prompt("ПАРОЛЬ (МИН 6 СИМВОЛОВ):");
        if (!password || password.length < 6) { alert("ПАРОЛЬ МИНИМУМ 6"); showAuthScreen(); return; }
        
        if (users[email]) {
            const err = login(email, password);
            if (err) { alert(err); showAuthScreen(); return; }
        } else {
            const err = register(email, username, password);
            if (err) { alert(err); showAuthScreen(); return; }
            const err2 = login(email, password);
            if (err2) { alert(err2); showAuthScreen(); return; }
        }
        document.querySelector('.app-container').style.display = 'flex';
        applyTheme(currentTheme);
        switchPage('feed');
    }

    function applyTheme(theme) {
        currentTheme = theme;
        document.body.className = `theme-${theme}`;
        localStorage.setItem('hj_theme', theme);
    }

    // ========== ЗАПУСК ==========
    document.addEventListener('DOMContentLoaded', () => {
        applyTheme(currentTheme);
        
        if (!currentSession || !users[currentSession]) {
            showAuthScreen();
        } else {
            document.querySelector('.app-container').style.display = 'flex';
            switchPage('feed');
        }
        
        document.getElementById('fabBtn').onclick = openPostModal;
        document.getElementById('topProfileBtn').onclick = () => switchPage('profile');
        document.getElementById('topSettingsBtn').onclick = () => switchPage('settings');
        
        document.getElementById('submitPostBtn').onclick = createPost;
        document.getElementById('closePostModalBtn').onclick = closePostModal;
        document.getElementById('closeTiktokModalBtn').onclick = closeTiktokModal;
        document.getElementById('saveUsernameBtn').onclick = saveUsername;
        document.getElementById('closeUsernameModalBtn').onclick = () => document.getElementById('editUsernameModal').classList.remove('active');
        document.getElementById('alertCloseBtn').onclick = () => document.getElementById('alertModal').classList.remove('active');
        
        document.getElementById('avatarInput').onchange = (e) => {
            if (e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    updateUserData({ avatar: ev.target.result });
                    renderProfile();
                    renderFeed();
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        };
        
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', () => switchPage(el.dataset.page));
        });
        
        // Добавляем ripple эффект на все кнопки
        document.querySelectorAll('.btn, .modal-btn, .action-btn, .nav-item, .top-icon, .fab, .post-avatar, .profile-tab').forEach(el => {
            el.classList.add('ripple');
        });
    });
</script>
</body>
</html>
