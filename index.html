<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomieJohnson — Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body.theme-dark {
            --bg: #000000;
            --surface: #0a0a0a;
            --card: #111111;
            --border: #ff003c;
            --text: #ffffff;
            --text-secondary: #888888;
            --accent: #ff003c;
            --gradient: linear-gradient(135deg, #ff003c, #00ff41);
            --input-bg: #1a1a1a;
        }

        body.theme-light {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #ff003c;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --accent: #ff003c;
            --gradient: linear-gradient(135deg, #ff003c, #e600ff);
            --input-bg: #f0f0f0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            width: 100%;
        }

        /* АНИМАЦИИ */
        @keyframes glitch {
            0%, 100% { text-shadow: -2px 0 #ff003c, 2px 0 #00ff41; }
            25% { text-shadow: -2px 0 #ff003c; }
            50% { text-shadow: 2px 0 #00ff41; }
            75% { text-shadow: -2px 0 #ff003c, 2px 0 #00ff41; }
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes heartBoom { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); text-shadow: 0 0 20px #ff003c; } 100% { transform: scale(2); opacity: 0; } }
        @keyframes storyRing {
            0% { box-shadow: 0 0 0 0 #ff003c; }
            50% { box-shadow: 0 0 0 4px #ff003c, 0 0 0 8px #00ff41; }
            100% { box-shadow: 0 0 0 0 #ff003c; }
        }
        
        .glitch-text { animation: glitch 0.5s infinite; }
        .post-card { animation: slideUp 0.3s ease; }
        .btn, .fab { transition: all 0.1s ease; }
        .btn:active, .fab:active { transform: scale(0.95); }
        .story-circle { animation: storyRing 2s infinite; }

        /* АВТОРИЗАЦИЯ */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-overlay.hidden { display: none; }
        .auth-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 360px;
            animation: slideUp 0.3s ease;
        }
        .auth-card h2 { text-align: center; margin-bottom: 24px; color: var(--accent); }
        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 12px;
        }
        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            border: none;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .auth-switch { text-align: center; margin-top: 20px; color: var(--text-secondary); }
        .auth-switch span { color: var(--accent); cursor: pointer; }
        .error-text { color: #ff003c; font-size: 12px; text-align: center; margin-bottom: 12px; }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        .app-container { display: none; flex-direction: column; height: 100vh; }
        .app-container.active { display: flex; }
        .top-bar {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
        }
        .top-logo { font-size: 20px; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .top-icons { display: flex; gap: 16px; }
        .top-icon { font-size: 22px; cursor: pointer; padding: 6px; }
        .main-content { margin-top: 54px; margin-bottom: 65px; flex: 1; overflow-y: auto; padding: 12px; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 11px;
            color: var(--text-secondary);
            border-radius: 12px;
        }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 24px; }
        .page { display: none; }
        .page.active-page { display: block; }

        /* ПОСТЫ */
        .post-card {
            background: var(--card);
            border-radius: 20px;
            margin-bottom: 12px;
            padding: 14px;
            border-left: 3px solid var(--accent);
        }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; cursor: pointer; }
        .post-avatar {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--gradient);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; font-size: 24px;
        }
        .post-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .post-username { font-weight: bold; color: var(--accent); }
        .post-time { font-size: 10px; color: var(--text-secondary); }
        .post-content { font-size: 14px; margin: 10px 0; line-height: 1.4; }
        .post-stats { display: flex; gap: 15px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); font-size: 13px; color: var(--text-secondary); }
        .post-stats span { margin-right: 10px; }
        .post-actions { display: flex; gap: 20px; margin-top: 8px; }
        .action-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 6px 12px; border-radius: 30px; font-size: 13px; display: flex; align-items: center; gap: 6px; }
        .action-btn:active { background: var(--accent-glow); }

        /* ДЖОНСОН ВИДЕОС */
        .tiktok-container {
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #000;
            border-radius: 20px;
        }
        .tiktok-slider { height: 100%; transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1); }
        .tiktok-item {
            height: 100%;
            position: relative;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .tiktok-video { width: 100%; height: auto; max-height: 70vh; object-fit: contain; cursor: pointer; }
        .tiktok-info {
            position: absolute;
            bottom: 20px;
            left: 16px;
            right: 70px;
            background: rgba(0,0,0,0.5);
            padding: 8px 12px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
        }
        .tiktok-info .name { font-weight: bold; font-size: 14px; }
        .tiktok-info .caption { font-size: 12px; margin-top: 4px; }
        .tiktok-actions {
            position: absolute;
            right: 12px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .tiktok-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 8px;
            border-radius: 30px;
        }
        .heart-active { color: #ff003c; }

        /* ПРОФИЛЬ */
        .profile-header {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }
        .profile-avatar-large {
            width: 90px; height: 90px; border-radius: 50%;
            margin: 0 auto 12px;
            background: var(--gradient);
            display: flex; align-items: center; justify-content: center;
            font-size: 40px; overflow: hidden; cursor: pointer;
            border: 3px solid var(--accent);
        }
        .profile-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .profile-stats { display: flex; justify-content: center; gap: 32px; margin: 16px 0; flex-wrap: wrap; }
        .stat-value { font-size: 20px; font-weight: bold; color: var(--accent); }
        .stat-label { font-size: 11px; color: var(--text-secondary); }
        .profile-stats-item { text-align: center; cursor: pointer; }
        .profile-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .profile-tab {
            flex: 1; text-align: center; padding: 12px;
            background: var(--card); border-radius: 30px;
            cursor: pointer; font-size: 13px;
        }
        .profile-tab.active { background: var(--accent); color: white; }
        .follow-btn { padding: 6px 16px; border-radius: 20px; background: var(--accent); color: white; border: none; font-size: 12px; cursor: pointer; }

        /* СТОРИС */
        .stories-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 12px 0;
            margin-bottom: 12px;
            background: var(--surface);
            border-radius: 20px;
        }
        .story-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .story-circle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid var(--accent);
        }
        .story-circle img { width: 100%; height: 100%; object-fit: cover; }
        .story-circle.has-story { border: 3px solid #ff003c; box-shadow: 0 0 10px #ff003c; animation: storyRing 2s infinite; }
        .story-name { font-size: 11px; color: var(--text-secondary); max-width: 70px; text-align: center; overflow: hidden; text-overflow: ellipsis; }

        /* ЛИЧКА */
        .dm-friend-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px; background: var(--card);
            border-radius: 16px; margin-bottom: 8px; cursor: pointer;
        }
        .dm-chat-area {
            background: var(--card); border-radius: 20px;
            margin-top: 12px; display: flex; flex-direction: column;
            height: 55vh;
        }
        .dm-messages-list { flex: 1; overflow-y: auto; padding: 12px; }
        .dm-message {
            background: var(--surface); padding: 8px 14px;
            border-radius: 20px; max-width: 75%; margin-bottom: 8px;
            font-size: 13px;
        }
        .dm-message.own { background: var(--accent); color: white; margin-left: auto; }
        .dm-input-area { display: flex; gap: 8px; padding: 12px; border-top: 1px solid var(--border); }
        .dm-input-area input { flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 30px; }

        /* НАСТРОЙКИ */
        .settings-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px; background: var(--card); border-radius: 16px; margin-bottom: 8px;
        }
        .theme-switch {
            width: 50px; height: 28px; background: var(--text-secondary);
            border-radius: 30px; position: relative; cursor: pointer;
        }
        .theme-switch.active { background: var(--accent); }
        .theme-switch-knob {
            width: 24px; height: 24px; background: white; border-radius: 50%;
            position: absolute; top: 2px; left: 3px; transition: 0.2s;
        }
        .theme-switch.active .theme-switch-knob { left: 23px; }
        .btn { background: var(--accent); border: none; padding: 10px 20px; color: white; border-radius: 30px; cursor: pointer; font-size: 13px; }
        
        /* ПЛАВАЮЩИЙ КРУЖОЧЕК */
        .fab {
            position: fixed;
            bottom: 75px;
            right: 16px;
            width: 56px;
            height: 56px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            cursor: pointer;
            z-index: 15;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
        }
        .fab.hidden { display: none; }

        .custom-modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.95);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .custom-modal.active { display: flex; }
        .modal-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 28px; padding: 24px; width: 90%; max-width: 340px;
            text-align: center;
        }
        .modal-card input, .modal-card textarea {
            width: 100%; padding: 14px; background: var(--input-bg);
            border: 1px solid var(--border); border-radius: 16px;
            color: var(--text); margin-bottom: 12px;
        }
        .modal-buttons { display: flex; gap: 12px; }
        .modal-btn { flex: 1; padding: 12px; background: var(--accent); border: none; border-radius: 30px; color: white; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body class="theme-dark">

<!-- АВТОРИЗАЦИЯ -->
<div class="auth-overlay" id="loginOverlay">
    <div class="auth-card">
        <h2 class="glitch-text">🔥 HJ</h2>
        <div id="loginError" class="error-text"></div>
        <input type="email" id="loginEmail" class="auth-input" placeholder="Почта">
        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" id="doLoginBtn">ВОЙТИ</button>
        <div class="auth-switch">Нет аккаунта? <span id="showRegBtn">Зарегистрироваться</span></div>
    </div>
</div>

<div class="auth-overlay hidden" id="regOverlay">
    <div class="auth-card">
        <h2 class="glitch-text">🔥 РЕГИСТРАЦИЯ</h2>
        <div id="regError" class="error-text"></div>
        <input type="email" id="regEmail" class="auth-input" placeholder="Почта">
        <input type="text" id="regUsername" class="auth-input" placeholder="Логин (мин 3)">
        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (мин 6)">
        <button class="auth-btn" id="doRegBtn">ЗАРЕГИСТРИРОВАТЬСЯ</button>
        <div class="auth-switch">Уже есть? <span id="backToLoginBtn">Войти</span></div>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ -->
<div class="app-container" id="appContainer">
    <div class="top-bar">
        <div class="top-logo glitch-text">🔥 HJ — JOHNSON VIDEOS</div>
        <div class="top-icons">
            <div class="top-icon" id="topProfileBtn">👤</div>
            <div class="top-icon" id="topSettingsBtn">⚙️</div>
        </div>
    </div>

    <div class="main-content">
        <div class="page" id="tiktokPage">
            <div class="tiktok-container" id="tiktokContainer"></div>
        </div>
        <div class="page" id="feedPage">
            <div class="stories-row" id="storiesRow"></div>
            <div id="postsFeed"></div>
        </div>
        <div class="page" id="profilePage"><div id="profileContent"></div></div>
        <div class="page" id="dmPage"><div id="dmContent"></div></div>
        <div class="page" id="settingsPage"><div id="settingsContent"></div></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" data-page="tiktok"><span class="nav-icon">🎵</span><span>ДЖОНСОН ВИДЕОС</span></div>
        <div class="nav-item" data-page="feed"><span class="nav-icon">📰</span><span>ЛЕНТА</span></div>
        <div class="nav-item" data-page="dm"><span class="nav-icon">💬</span><span>ЛИЧКА</span></div>
    </div>
</div>

<div class="fab" id="fabBtn">+</div>

<!-- МОДАЛКИ -->
<div class="custom-modal" id="postModal">
    <div class="modal-card">
        <h3>📝 НОВЫЙ ПОСТ</h3>
        <textarea id="postContentInput" placeholder="Что думаешь?"></textarea>
        <div class="modal-buttons">
            <button class="modal-btn" id="submitPostBtn">ОПУБЛИКОВАТЬ</button>
            <button class="modal-btn" id="closePostModalBtn" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">ОТМЕНА</button>
        </div>
    </div>
</div>

<div class="custom-modal" id="tiktokModal">
    <div class="modal-card">
        <h3>🎵 НОВЫЙ ТИКТОК</h3>
        <div class="btn" id="selectVideoBtn" style="margin-bottom:12px">📹 ВЫБРАТЬ ВИДЕО</div>
        <input type="text" id="tiktokCaptionInput" placeholder="Описание...">
        <div class="modal-buttons">
            <button class="modal-btn" id="submitTiktokBtn">ЗАЛИТЬ</button>
            <button class="modal-btn" id="closeTiktokModalBtn" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">ОТМЕНА</button>
        </div>
    </div>
    <input type="file" id="tiktokFileInput" accept="video/*">
</div>

<div class="custom-modal" id="storyModal">
    <div class="modal-card">
        <h3>📸 НОВЫЙ СТОРИС</h3>
        <div class="btn" id="selectStoryBtn" style="margin-bottom:12px">📷 ВЫБРАТЬ ФОТО/ВИДЕО</div>
        <div class="modal-buttons">
            <button class="modal-btn" id="submitStoryBtn">ОПУБЛИКОВАТЬ</button>
            <button class="modal-btn" id="closeStoryModalBtn" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">ОТМЕНА</button>
        </div>
    </div>
    <input type="file" id="storyFileInput" accept="image/*,video/*">
</div>

<div class="custom-modal" id="viewStoryModal">
    <div class="modal-card" style="padding:0; background:transparent; border:none; max-width:90%">
        <div id="storyViewContent" style="border-radius:20px; overflow:hidden"></div>
        <button class="modal-btn" id="closeViewStoryBtn" style="margin-top:12px">ЗАКРЫТЬ</button>
    </div>
</div>

<div class="custom-modal" id="editUsernameModal">
    <div class="modal-card">
        <h3>✏️ СМЕНИТЬ НИК</h3>
        <input type="text" id="newUsernameInput" placeholder="Новый никнейм">
        <div class="modal-buttons">
            <button class="modal-btn" id="saveUsernameBtn">СОХРАНИТЬ</button>
            <button class="modal-btn" id="closeUsernameModalBtn" style="background:transparent;border:1px solid var(--accent);color:var(--accent)">ОТМЕНА</button>
        </div>
    </div>
</div>

<div class="custom-modal" id="alertModal">
    <div class="modal-card">
        <h3>⚠️</h3>
        <p id="alertMessage" style="margin-bottom:20px"></p>
        <button class="modal-btn" id="alertCloseBtn">ПОНЯТНО</button>
    </div>
</div>

<input type="file" id="avatarInput" accept="image/*" style="display:none">

<script>
    // ========== ПОЛЬЗОВАТЕЛИ ==========
    let users = JSON.parse(localStorage.getItem('hj_users')) || {};
    let currentSession = localStorage.getItem('hj_session');

    function saveUsers() { localStorage.setItem('hj_users', JSON.stringify(users)); }
    function hashPassword(pwd) { return btoa(pwd + "hj_salt_2024"); }
    function validateEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
    function validateUsername(u) { return u && u.length >= 3 && /^[a-zA-Z0-9_]+$/.test(u); }
    function validatePassword(p) { return p && p.length >= 6; }

    function register(email, username, password) {
        if (!validateEmail(email)) return "Некорректная почта";
        if (!validateUsername(username)) return "Логин: мин 3 символа, буквы/цифры/_";
        if (!validatePassword(password)) return "Пароль: мин 6 символов";
        if (users[email]) return "Почта уже занята";
        if (Object.values(users).find(u => u.username === username)) return "Логин уже занят";
        users[email] = { email, username, password: hashPassword(password), avatar: null, friends: [], followers: [], following: [], stories: [], dms: {}, createdAt: Date.now() };
        saveUsers();
        return null;
    }

    function login(email, password) {
        const user = users[email];
        if (!user) return "Пользователь не найден";
        if (user.password !== hashPassword(password)) return "Неверный пароль";
        currentSession = email;
        localStorage.setItem('hj_session', currentSession);
        return null;
    }

    function getCurrentUser() { return currentSession ? users[currentSession] : null; }
    function getUserByEmail(email) { return users[email]; }
    function getUserByUsername(username) { return Object.values(users).find(u => u.username === username); }
    function updateUserData(data) { if (currentSession && users[currentSession]) { users[currentSession] = { ...users[currentSession], ...data }; saveUsers(); } }
    function logout() { localStorage.removeItem('hj_session'); currentSession = null; }

    // ========== ДАННЫЕ ==========
    let posts = JSON.parse(localStorage.getItem('hj_posts')) || [];
    let tiktoks = JSON.parse(localStorage.getItem('hj_tiktoks')) || [];
    let likedPosts = new Set(JSON.parse(localStorage.getItem('hj_liked_posts')) || []);
    let repostedPosts = new Set(JSON.parse(localStorage.getItem('hj_reposted_posts')) || []);
    let likedTiktoks = new Set(JSON.parse(localStorage.getItem('hj_liked_tiktoks')) || []);
    let currentPage = "feed";
    let selectedDmFriend = null;
    let currentTheme = localStorage.getItem('hj_theme') || 'dark';
    let currentProfileTab = "posts";
    let currentTiktokIndex = 0;
    let touchStartY = 0;
    let viewingProfileEmail = null;

    function saveAppData() {
        localStorage.setItem('hj_posts', JSON.stringify(posts));
        localStorage.setItem('hj_tiktoks', JSON.stringify(tiktoks));
        localStorage.setItem('hj_liked_posts', JSON.stringify([...likedPosts]));
        localStorage.setItem('hj_reposted_posts', JSON.stringify([...repostedPosts]));
        localStorage.setItem('hj_liked_tiktoks', JSON.stringify([...likedTiktoks]));
    }

    function showHeartAnimation(x, y) {

        heart.style.position = 'fixed';
        heart.style.left = x + 'px';
        heart.style.top = y + 'px';
        heart.style.fontSize = '32px';
        heart.style.pointerEvents = 'none';

    // ========== ПОДПИСКИ ==========
    function followUser(targetEmail) {
        const current = getCurrentUser();
        const target = getUserByEmail(targetEmail);
        if (!current || !target || current.email === targetEmail) return;
        if (!current.following) current.following = [];
        if (!target.followers) target.followers = [];
        if (!current.following.includes(targetEmail)) {
            current.following.push(targetEmail);
            target.followers.push(current.email);
            saveUsers();
            if (viewingProfileEmail === targetEmail) renderProfile();
            renderFeed();
            showAlert(`Вы подписались на ${target.username}`);
        }
    }

    function unfollowUser(targetEmail) {
        const current = getCurrentUser();
        const target = getUserByEmail(targetEmail);
        if (!current || !target) return;
        current.following = (current.following || []).filter(e => e !== targetEmail);
        target.followers = (target.followers || []).filter(e => e !== current.email);
        saveUsers();
        if (viewingProfileEmail === targetEmail) renderProfile();
        renderFeed();
    }

    function isFollowing(targetEmail) {
        const current = getCurrentUser();
        if (!current) return false;
        return (current.following || []).includes(targetEmail);
    }

    // ========== СТОРИС ==========
    function addStory(mediaUrl, mediaType) {
        const user = getCurrentUser();
        if (!user) return;
        if (!user.stories) user.stories = [];
        user.stories.unshift({ id: Date.now(), mediaUrl, mediaType, timestamp: Date.now() });
        // Удаляем старые (>24ч)
        user.stories = user.stories.filter(s => Date.now() - s.timestamp < 86400000);
        saveUsers();
        renderStoriesRow();
        showAlert("Сторис добавлен!");
    }

    function renderStoriesRow() {
        const container = document.getElementById('storiesRow');
        if (!container) return;
        const current = getCurrentUser();
        let html = `<div class="story-item" onclick="openStoryUpload()">
            <div class="story-circle" style="background: var(--gradient);"><span style="font-size:30px">+</span></div>
            <span class="story-name">Мой сторис</span>
        </div>`;
        
        // Показываем сторис друзей (подписок)
        const following = current?.following || [];
        const friendsWithStories = [];
        for (const email of following) {
            const user = getUserByEmail(email);
            if (user && user.stories && user.stories.length > 0) {
                friendsWithStories.push(user);
            }
        }
        // Сортируем по свежести
        friendsWithStories.sort((a,b) => (b.stories?.[0]?.timestamp || 0) - (a.stories?.[0]?.timestamp || 0));
        
        for (const user of friendsWithStories) {
            const latestStory = user.stories[0];
            html += `<div class="story-item" onclick="viewStories('${user.email}')">
                <div class="story-circle has-story">${user.avatar ? `<img src="${user.avatar}">` : '👤'}</div>
                <span class="story-name">${escapeHtml(user.username)}</span>
            </div>`;
        }
        container.innerHTML = html;
    }

    function openStoryUpload() {
        document.getElementById('storyModal').classList.add('active');
    }

    function viewStories(userEmail) {
        const user = getUserByEmail(userEmail);
        if (!user || !user.stories || user.stories.length === 0) return;
        let index = 0;
        function showStory() {
            const story = user.stories[index];
            const container = document.getElementById('storyViewContent');
            if (story.mediaType === 'image') {
                container.innerHTML = `<img src="${story.mediaUrl}" style="max-width:100%; max-height:70vh; border-radius:20px">`;
            } else {
                container.innerHTML = `<video src="${story.mediaUrl}" autoplay style="max-width:100%; max-height:70vh; border-radius:20px" controls></video>`;
            }
            document.getElementById('viewStoryModal').classList.add('active');
            const timeout = setTimeout(() => {
                index++;
                if (index < user.stories.length) showStory();
                else document.getElementById('viewStoryModal').classList.remove('active');
            }, 5000);
            document.getElementById('closeViewStoryBtn').onclick = () => { clearTimeout(timeout); document.getElementById('viewStoryModal').classList.remove('active'); };
        }
        showStory();
    }

    document.getElementById('storyFileInput').onchange = (e) => {

            reader.onload = (ev) => { window.pendingStory = ev.target.result; window.pendingStoryType = e.target.files[0].type.startsWith('image') ? 'image' : 'video'; showAlert("Медиа готово!"); };
            reader.readAsDataURL(e.target.files[0]);

    function openPostModal() { document.getElementById('postModal').classList.add('active'); }
    function closePostModal() { document.getElementById('postModal').classList.remove('active'); document.getElementById('postContentInput').value = ''; }

    function createPost() {
        const content = document.getElementById('postContentInput').value.trim();
        if (!content) { showAlert("Напиши что-нибудь"); return; }
        const user = getCurrentUser();
        posts.unshift({ id: Date.now(), userId: user.email, username: user.username, avatar: user.avatar, content: content, timestamp: new Date().toLocaleString(), likes: 0, reposts: 0, originalPostId: null });

        closePostModal();
        renderFeed();

    function likePost(id, event) {
        const p = posts.find(x => x.id == id);
        if (likedPosts.has(id)) { likedPosts.delete(id); p.likes--; }
        else { likedPosts.add(id); p.likes++; if (event) { const rect = event.target.getBoundingClientRect(); showHeartAnimation(rect.left + rect.width/2, rect.top + rect.height/2); } }
        saveAppData();
        renderFeed();
    }

    function repostPost(id, event) {
        const original = posts.find(x => x.id == id);
        if (!original) return;
        const user = getCurrentUser();
        if (repostedPosts.has(id)) { showAlert("Вы уже репостнули этот пост"); return; }
        repostedPosts.add(id);
        original.reposts++;
        posts.unshift({ id: Date.now(), userId: user.email, username: user.username, avatar: user.avatar, content: `🔁 Репост: ${original.content.substring(0, 100)}`, timestamp: new Date().toLocaleString(), likes: 0, reposts: 0, originalPostId: id });
        if (event) showHeartAnimation(event.clientX, event.clientY);
        saveAppData();
        renderFeed();
        showAlert("Репост сделан!");
    }

        const container = document.getElementById('postsFeed');

        container.innerHTML = posts.map(p => `

    // ========== ДЖОНСОН ВИДЕОС ==========
    function renderTiktokFeed() {
        const container = document.getElementById('tiktokContainer');
        if (!container) return;
        if (!tiktoks.length) { container.innerHTML = '<div style="height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px"><div style="font-size:48px">🎵</div><div style="text-align:center;color:var(--text-secondary)">НЕТ ВИДЕО</div><button class="btn" id="emptyTiktokBtn">➕ ДОБАВИТЬ</button></div>'; document.getElementById('emptyTiktokBtn')?.addEventListener('click', openTiktokModal); return; }
        const slider = document.createElement('div'); slider.className = 'tiktok-slider'; slider.id = 'tiktokSlider';
        tiktoks.forEach((t, idx) => {
            const item = document.createElement('div'); item.className = 'tiktok-item';
            item.innerHTML = `
                <video src="${t.videoUrl}" class="tiktok-video" loop playsinline id="vid_${t.id}"></video>
                <div class="tiktok-info"><div class="name">${escapeHtml(t.username)}</div><div class="caption">${escapeHtml(t.caption || '')}</div></div>
                <div class="tiktok-actions"><div class="tiktok-action" onclick="event.stopPropagation(); likeTiktok(${t.id}, event)"><div style="font-size:28px" class="${likedTiktoks.has(t.id) ? 'heart-active' : ''}">${likedTiktoks.has(t.id) ? '❤️' : '♡'}</div><div>${t.likes || 0}</div></div></div>
            `;
            slider.appendChild(item);
        });

    function updateTiktokPosition() { const slider = document.getElementById('tiktokSlider'); if (slider) slider.style.transform = `translateY(-${currentTiktokIndex * 100}%)`; }
    function pauseAllVideos() { document.querySelectorAll('.tiktok-video').forEach(v => v.pause()); }
    function playCurrentVideo() { if (!tiktoks.length || currentTiktokIndex >= tiktoks.length) return; const video = document.getElementById(`vid_${tiktoks[currentTiktokIndex].id}`); if (video) video.play().catch(e => console.log()); }
    function attachVideoClickHandlers() { document.querySelectorAll('.tiktok-video').forEach(video => { video.onclick = (e) => { e.stopPropagation(); if (video.paused) video.play(); else video.pause(); }; }); }
    function setupTiktokSwipe() {
        const container = document.getElementById('tiktokContainer');
        if (!container) return;
        const newContainer = container.cloneNode(true);
        container.parentNode.replaceChild(newContainer, container);
        newContainer.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: false });
        newContainer.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });
        newContainer.addEventListener('touchend', (e) => {
            const diff = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diff) < 50) return;
            if (diff > 0 && currentTiktokIndex > 0) currentTiktokIndex--;
            else if (diff < 0 && currentTiktokIndex < tiktoks.length - 1) currentTiktokIndex++;
            else return;
            updateTiktokPosition();
            pauseAllVideos();
            playCurrentVideo();
        });
    }

    function likeTiktok(id, event) {

        if (likedTiktoks.has(id)) { likedTiktoks.delete(id); t.likes--; }
        else { likedTiktoks.add(id); t.likes++; if (event) { const rect = event.target.getBoundingClientRect(); showHeartAnimation(rect.left + rect.width/2, rect.top + rect.height/2); } }
        saveAppData(); renderTiktokFeed();
    }

                    <div class="profile-stats-item" onclick="showFollowing('${user.email}')"><div class="stat-value">${user.following?.length || 0}</div><div class="stat-label">ПОДПИСОК</div></div>

    function searchUser(username) {
        const user = getCurrentUser();
        if (user.friends?.includes(username)) { showAlert("Уже друг"); return; }
        if (user.friendRequests?.includes(username)) { showAlert("Заявка уже отправлена"); return; }
        updateUserData({ friendRequests: [...(user.friendRequests || []), username] });
        renderDM(); showAlert(`Заявка отправлена ${username}`);
    }

    function acceptFriend(username) {
        const user = getCurrentUser();
        updateUserData({ friendRequests: (user.friendRequests || []).filter(f => f !== username), friends: [...(user.friends || []), username], dms: { ...(user.dms || {}), [username]: [] } });
        renderDM(); renderProfile();

    function rejectFriend(username) {
        const user = getCurrentUser();
        updateUserData({ friendRequests: (user.friendRequests || []).filter(f => f !== username) });
        renderDM();

    function openDm(friend) { selectedDmFriend = friend; renderDmChat(); }
    function sendDm() {
        const user = getCurrentUser();
        if (!selectedDmFriend) { showAlert("Выбери друга"); return; }
        const input = document.getElementById('dmMessageInput');
        const text = input?.value.trim();
        if (!text) return;
        if (!user.dms) user.dms = {};
        if (!user.dms[selectedDmFriend]) user.dms[selectedDmFriend] = [];
        user.dms[selectedDmFriend].push({ from: user.username, text: text, time: new Date().toLocaleTimeString() });
        updateUserData({ dms: user.dms });
        if (input) input.value = '';
        renderDmChat();
    }

    function renderDmChat() {
        const user = getCurrentUser();
        const messagesDiv = document.getElementById('dmMessagesList');
        if (!selectedDmFriend) { if (messagesDiv) messagesDiv.innerHTML = '<div style="text-align:center;padding:40px">ВЫБЕРИ ДРУГА</div>'; return; }
        const msgs = user.dms?.[selectedDmFriend] || [];
        if (!msgs.length) { if (messagesDiv) messagesDiv.innerHTML = '<div style="text-align:center;padding:40px">НЕТ СООБЩЕНИЙ</div>'; }
        else { if (messagesDiv) messagesDiv.innerHTML = msgs.map(m => `<div class="dm-message ${m.from === user.username ? 'own' : ''}"><div>${escapeHtml(m.text)}</div><div style="font-size:10px;opacity:0.7">${m.time}</div></div>`).join(''); }

    function switchPage(pageId) {
        currentPage = pageId;
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`${pageId}Page`).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(item => { if (item.dataset.page === pageId) item.classList.add('active'); else item.classList.remove('active'); });
        
        // Управление плавающим кружочком
        const fab = document.getElementById('fabBtn');
        if (pageId === 'tiktok') fab.classList.add('hidden');
        else fab.classList.remove('hidden');
        
        if (pageId === 'tiktok') { currentTiktokIndex = 0; renderTiktokFeed(); }
        if (pageId === 'feed') { renderFeed(); renderStoriesRow(); }
        if (pageId === 'profile') { viewingProfileEmail = null; renderProfile(); }
        if (pageId === 'dm') renderDM();
        if (pageId === 'settings') renderSettings();
    }

    function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    function applyTheme(theme) { currentTheme = theme; document.body.className = `theme-${theme}`; localStorage.setItem('hj_theme', theme); }

    // ========== ЗАПУСК ==========
    document.addEventListener('DOMContentLoaded', () => {
        applyTheme(currentTheme);
        if (currentSession && users[currentSession]) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.add('active');
            switchPage('feed');
        } else {
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('appContainer').classList.remove('active');
        }
        
        document.getElementById('showRegBtn').onclick = () => { document.getElementById('loginOverlay').classList.add('hidden'); document.getElementById('regOverlay').classList.remove('hidden'); };
        document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('regOverlay').classList.add('hidden'); document.getElementById('loginOverlay').classList.remove('hidden'); };
        document.getElementById('doLoginBtn').onclick = () => {
            const err = login(document.getElementById('loginEmail').value, document.getElementById('loginPassword').value);
            if (err) { document.getElementById('loginError').innerText = err; return; }
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.add('active');
            switchPage('feed');
        };
        document.getElementById('doRegBtn').onclick = () => {
            const err = register(document.getElementById('regEmail').value, document.getElementById('regUsername').value, document.getElementById('regPassword').value);
            if (err) { document.getElementById('regError').innerText = err; return; }
            const err2 = login(document.getElementById('regEmail').value, document.getElementById('regPassword').value);
            if (err2) { document.getElementById('regError').innerText = err2; return; }
            document.getElementById('regOverlay').classList.add('hidden');
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('appContainer').classList.add('active');
            switchPage('feed');
        };
        
        document.getElementById('fabBtn').onclick = openPostModal;
        document.getElementById('topProfileBtn').onclick = () => { viewingProfileEmail = null; switchPage('profile'); };
        document.getElementById('topSettingsBtn').onclick = () => switchPage('settings');
        document.getElementById('submitPostBtn').onclick = createPost;
        document.getElementById('closePostModalBtn').onclick = () => document.getElementById('postModal').classList.remove('active');
        document.getElementById('closeTiktokModalBtn').onclick = closeTiktokModal;
        document.getElementById('saveUsernameBtn').onclick = saveUsername;
        document.getElementById('closeUsernameModalBtn').onclick = () => document.getElementById('editUsernameModal').classList.remove('active');
        document.getElementById('alertCloseBtn').onclick = () => document.getElementById('alertModal').classList.remove('active');
        document.getElementById('avatarInput').onchange = (e) => { if (e.target.files[0]) { const r = new FileReader(); r.onload = (ev) => { updateUserData({ avatar: ev.target.result }); if (viewingProfileEmail === getCurrentUser()?.email) renderProfile(); renderFeed(); }; r.readAsDataURL(e.target.files[0]); } };
        
        document.querySelectorAll('.nav-item').forEach(el => { el.addEventListener('click', () => switchPage(el.dataset.page)); });
    });
</script>
</body>
</html>
