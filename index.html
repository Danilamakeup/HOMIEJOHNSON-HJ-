<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>HomieJohnson — Регистрация с 2FA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --transition: all 0.2s ease;
        }

        body.theme-dark {
            --bg: #000000;
            --surface: #0a0a0a;
            --card: #111111;
            --border: #ff003c;
            --text: #ffffff;
            --text-secondary: #888888;
            --accent: #ff003c;
            --input-bg: #1a1a1a;
            --gradient: linear-gradient(135deg, #ff003c, #00ff41);
        }

        body.theme-light {
            --bg: #f0f2f5;
            --surface: #ffffff;
            --card: #ffffff;
            --border: #ff003c;
            --text: #1a1a1a;
            --text-secondary: #65676b;
            --accent: #ff003c;
            --input-bg: #f0f0f0;
            --gradient: linear-gradient(135deg, #ff003c, #e600ff);
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        /* АВТОРИЗАЦИЯ */
        .auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .auth-screen.hidden {
            display: none;
        }

        .auth-card {
            background: var(--card);
            border-radius: 32px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
        }

        .auth-logo {
            font-size: 32px;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 24px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            color: var(--text);
            font-size: 16px;
            margin-bottom: 12px;
            outline: none;
        }

        .auth-input:focus {
            border-color: #00ff41;
        }

        .auth-btn {
            width: 100%;
            padding: 14px;
            background: var(--gradient);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }

        .auth-switch {
            text-align: center;
            margin-top: 20px;
            color: var(--text-secondary);
        }

        .auth-switch span {
            color: var(--accent);
            cursor: pointer;
        }

        .error-msg {
            color: #ff003c;
            font-size: 12px;
            margin-bottom: 12px;
            text-align: center;
        }

        /* КОД ПОДТВЕРЖДЕНИЯ */
        .code-inputs {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0;
        }

        .code-digit {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            background: var(--input-bg);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--accent);
        }

        /* ОСНОВНОЕ ПРИЛОЖЕНИЕ */
        .app-container {
            display: none;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
        }

        .app-container.active {
            display: flex;
        }

        .top-bar {
            background: var(--surface);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 10;
        }

        .top-logo {
            font-size: 20px;
            font-weight: bold;
            background: var(--gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .top-icons {
            display: flex;
            gap: 16px;
        }

        .top-icon {
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
        }

        .main-content {
            margin-top: 54px;
            margin-bottom: 65px;
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            -webkit-overflow-scrolling: touch;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 1px solid var(--border);
            z-index: 10;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-secondary);
            border-radius: 12px;
        }

        .nav-item.active {
            color: var(--accent);
        }

        .nav-icon {
            font-size: 24px;
        }

        .page {
            display: none;
        }

        .page.active-page {
            display: block;
        }

        /* КАРТОЧКИ */
        .post-card {
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 12px;
            padding: 14px;
            border-left: 3px solid var(--accent);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-size: 24px;
        }

        .post-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-username {
            font-weight: bold;
            color: var(--accent);
        }

        .post-time {
            font-size: 10px;
            color: var(--text-secondary);
        }

        .post-content {
            font-size: 14px;
            margin: 8px 0;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .tiktok-container {
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 12px;
            position: relative;
        }

        .tiktok-video {
            width: 100%;
            max-height: 70vh;
            object-fit: contain;
        }

        .tiktok-overlay {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 70px;
        }

        .tiktok-username {
            font-weight: bold;
            text-shadow: 0 1px 3px black;
        }

        .tiktok-actions {
            position: absolute;
            right: 8px;
            bottom: 60px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .tiktok-action {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .heart-active {
            color: #ff003c;
        }

        .btn {
            background: var(--accent);
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .profile-avatar-large {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 28px;
            margin: 16px 0;
        }

        .stat-value {
            font-size: 20px;
            font-weight: bold;
            color: var(--accent);
        }

        .dm-friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .dm-chat-area {
            background: var(--card);
            border-radius: 16px;
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            height: 55vh;
        }

        .dm-messages-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
        }

        .dm-message {
            background: var(--surface);
            padding: 8px 12px;
            border-radius: 18px;
            max-width: 75%;
            margin-bottom: 8px;
        }

        .dm-message.own {
            background: var(--accent);
            color: white;
            margin-left: auto;
        }

        .dm-input-area {
            display: flex;
            gap: 8px;
            padding: 12px;
            border-top: 1px solid var(--border);
        }

        .dm-input-area input {
            flex: 1;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 25px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background: var(--card);
            border-radius: 12px;
            margin-bottom: 8px;
        }

        .theme-switch {
            width: 50px;
            height: 28px;
            background: var(--text-secondary);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
        }

        .theme-switch.active {
            background: var(--accent);
        }

        .theme-switch-knob {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }

        .theme-switch.active .theme-switch-knob {
            left: 23px;
        }

        .fab {
            position: fixed;
            bottom: 75px;
            right: 16px;
            width: 52px;
            height: 52px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            z-index: 15;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card);
            border: 1px solid var(--accent);
            border-radius: 24px;
            padding: 24px;
            width: 320px;
            text-align: center;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
<body class="theme-dark">

<!-- ЭКРАН ЛОГИНА -->
<div class="auth-screen" id="loginScreen">
    <div class="auth-card">
        <div class="auth-logo">🔥 HJ</div>
        <div id="loginError" class="error-msg"></div>
        <input type="email" id="loginEmail" class="auth-input" placeholder="Почта">
        <input type="password" id="loginPassword" class="auth-input" placeholder="Пароль">
        <button class="auth-btn" id="loginBtn">ВОЙТИ</button>
        <div class="auth-switch">
            Нет аккаунта? <span id="showRegBtn">Зарегистрироваться</span>
        </div>
    </div>
</div>

<!-- ЭКРАН РЕГИСТРАЦИИ -->
<div class="auth-screen hidden" id="regScreen">
    <div class="auth-card">
        <div class="auth-logo">🔥 HJ Регистрация</div>
        <div id="regError" class="error-msg"></div>
        <input type="email" id="regEmail" class="auth-input" placeholder="Почта">
        <input type="text" id="regUsername" class="auth-input" placeholder="Логин (от 3 символов)">
        <input type="password" id="regPassword" class="auth-input" placeholder="Пароль (минимум 6 символов)">
        <button class="auth-btn" id="sendCodeBtn">ОТПРАВИТЬ КОД НА ПОЧТУ</button>
        <div class="auth-switch">
            Уже есть? <span id="backToLoginBtn">Войти</span>
        </div>
    </div>
</div>

<!-- ЭКРАН ПОДТВЕРЖДЕНИЯ КОДА -->
<div class="auth-screen hidden" id="codeScreen">
    <div class="auth-card">
        <div class="auth-logo">🔐 Подтверждение</div>
        <div id="codeError" class="error-msg"></div>
        <p style="text-align:center;margin-bottom:16px">Код отправлен на<br><strong id="codeEmailDisplay"></strong></p>
        <div class="code-inputs">
            <input type="text" maxlength="1" class="code-digit" id="code1">
            <input type="text" maxlength="1" class="code-digit" id="code2">
            <input type="text" maxlength="1" class="code-digit" id="code3">
            <input type="text" maxlength="1" class="code-digit" id="code4">
            <input type="text" maxlength="1" class="code-digit" id="code5">
            <input type="text" maxlength="1" class="code-digit" id="code6">
        </div>
        <button class="auth-btn" id="verifyCodeBtn">ПОДТВЕРДИТЬ</button>
        <div class="auth-switch">
            <span id="resendCodeBtn">Отправить код снова</span>
        </div>
    </div>
</div>

<!-- ОСНОВНОЕ ПРИЛОЖЕНИЕ (то же самое, без изменений) -->
<div class="app-container" id="appContainer">
    <div class="top-bar">
        <div class="top-logo">🔥 HJ</div>
        <div class="top-icons">
            <div class="top-icon" id="topProfileBtn">👤</div>
            <div class="top-icon" id="topSettingsBtn">⚙️</div>
        </div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="page" id="tiktokPage"><div id="tiktokFeed"></div></div>
        <div class="page" id="feedPage"><div id="postsFeed"></div></div>
        <div class="page" id="profilePage"><div id="profileContent"></div></div>
        <div class="page" id="dmPage"><div id="dmContent"></div></div>
        <div class="page" id="settingsPage"><div id="settingsContent"></div></div>
    </div>
    <div class="bottom-nav">
        <div class="nav-item" data-page="tiktok"><span class="nav-icon">🎵</span><span>ТикТок</span></div>
        <div class="nav-item" data-page="feed"><span class="nav-icon">📰</span><span>Лента</span></div>
        <div class="nav-item" data-page="dm"><span class="nav-icon">💬</span><span>Личка</span></div>
    </div>
</div>
<div class="fab" id="fabBtn">+</div>

<script>
    // ========== ВРЕМЕННОЕ ХРАНИЛИЩЕ КОДОВ (эмуляция почты) ==========
    let pendingCodes = {}; // { email: { code, expires, tempUserData } }

    function generateCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    // Эмуляция отправки на почту (в реальном проекте тут API)
    function sendCodeToEmail(email, code) {
        console.log(`[EMAIL] Код подтверждения для ${email}: ${code}`);
        // В браузере показываем alert с кодом (имитация почты)
        alert(`📧 НА ВАШУ ПОЧТУ ОТПРАВЛЕН КОД: ${code}\n(в реальном проекте придет на email, сейчас демо-режим)`);
        return true;
    }

    // ========== ВАЛИДАЦИЯ ==========
    function validateEmail(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validateUsername(username) {
        return username && username.length >= 3 && /^[a-zA-Z0-9_]+$/.test(username);
    }

    function validatePassword(password) {
        return password && password.length >= 6;
    }

    // ========== ПОЛЬЗОВАТЕЛИ ==========
    let users = JSON.parse(localStorage.getItem('hj_users')) || {};
    let currentSession = localStorage.getItem('hj_session');

    function saveUsers() { localStorage.setItem('hj_users', JSON.stringify(users)); }
    function hashPassword(pwd) { return btoa(pwd + "hj_salt_2fa_2024"); }

    // Регистрация с 2FA — сохраняем временные данные
    function startRegistration(email, username, password) {
        if (!validateEmail(email)) return "Некорректная почта";
        if (!validateUsername(username)) return "Логин: минимум 3 символа, только буквы/цифры/_";
        if (!validatePassword(password)) return "Пароль: минимум 6 символов";
        if (users[email]) return "Почта уже зарегистрирована";
        if (Object.values(users).find(u => u.username === username)) return "Логин уже занят";

        const code = generateCode();
        pendingCodes[email] = {
            code: code,
            expires: Date.now() + 5 * 60 * 1000,
            tempUserData: { email, username, password: hashPassword(password) }
        };
        sendCodeToEmail(email, code);
        return null;
    }

    function verifyCode(email, inputCode) {
        const pending = pendingCodes[email];
        if (!pending) return "Код не найден. Запросите новый";
        if (Date.now() > pending.expires) return "Код истек. Запросите новый";
        if (pending.code !== inputCode) return "Неверный код подтверждения";

        // Регистрируем пользователя
        const { email: userEmail, username, password } = pending.tempUserData;
        users[userEmail] = {
            email: userEmail,
            username: username,
            password: password,
            avatar: null,
            friends: [],
            friendRequests: [],
            dms: {},
            createdAt: Date.now(),
            isVerified: true
        };
        saveUsers();
        delete pendingCodes[email];
        return null;
    }

    function login(email, password) {
        const user = users[email];
        if (!user) return "Пользователь не найден";
        if (user.password !== hashPassword(password)) return "Неверный пароль";
        if (!user.isVerified) return "Аккаунт не подтвержден. Зарегистрируйтесь заново";
        currentSession = email;
        localStorage.setItem('hj_session', currentSession);
        return null;
    }

    function getCurrentUser() { return currentSession ? users[currentSession] : null; }
    function updateUserData(data) { if (currentSession && users[currentSession]) { users[currentSession] = { ...users[currentSession], ...data }; saveUsers(); } }
    function logout() { localStorage.removeItem('hj_session'); currentSession = null; }

    // ========== ДАННЫЕ ПОСТОВ И Т.Д. ==========
    let posts = JSON.parse(localStorage.getItem('hj_posts')) || [];
    let tiktoks = JSON.parse(localStorage.getItem('hj_tiktoks')) || [];
    let likedPosts = new Set(JSON.parse(localStorage.getItem('hj_liked_posts')) || []);
    let likedTiktoks = new Set(JSON.parse(localStorage.getItem('hj_liked_tiktoks')) || []);
    let currentPage = "feed";
    let selectedDmFriend = null;
    let currentTheme = localStorage.getItem('hj_theme') || 'dark';

    function saveAppData() {
        localStorage.setItem('hj_posts', JSON.stringify(posts));
        localStorage.setItem('hj_tiktoks', JSON.stringify(tiktoks));
        localStorage.setItem('hj_liked_posts', JSON.stringify([...likedPosts]));
        localStorage.setItem('hj_liked_tiktoks', JSON.stringify([...likedTiktoks]));
    }

    // ========== ОТРИСОВКА (упрощенная, но рабочая) ==========
    function renderFeed() {
        const container = document.getElementById('postsFeed');
        if (!container) return;
        if (!posts.length) { container.innerHTML = '<div style="text-align:center;padding:40px"><button class="btn" onclick="createTextPost()">📝 Первый пост</button></div>'; return; }
        container.innerHTML = posts.map(p => `
            <div class="post-card">
                <div class="post-header">
                    <div class="post-avatar">${p.avatar ? `<img src="${p.avatar}">` : '👤'}</div>
                    <div><div class="post-username">${escapeHtml(p.username)}</div><div class="post-time">${p.timestamp}</div></div>
                </div>
                <div class="post-content">${escapeHtml(p.content)}</div>
                <div class="post-actions"><button class="action-btn" onclick="likePost(${p.id})">❤️ ${p.likes}</button></div>
            </div>
        `).join('');
    }

    function likePost(id) { const p = posts.find(x => x.id == id); if (likedPosts.has(id)) { likedPosts.delete(id); p.likes--; } else { likedPosts.add(id); p.likes++; } saveAppData(); renderFeed(); }
    function createTextPost() { const content = prompt("Что напишешь?"); if (content?.trim()) { const u = getCurrentUser(); posts.unshift({ id: Date.now(), userId: u.email, username: u.username, avatar: u.avatar, content: content, timestamp: new Date().toLocaleString(), likes: 0 }); saveAppData(); renderFeed(); switchPage('feed'); } }

    function renderTiktokFeed() {
        const container = document.getElementById('tiktokFeed');
        if (!container) return;
        if (!tiktoks.length) { container.innerHTML = '<div style="text-align:center;padding:40px"><button class="btn" onclick="openTiktokModal()">🎵 Добавить тикток</button></div>'; return; }
        container.innerHTML = tiktoks.map(t => `
            <div class="tiktok-container">
                <video src="${t.videoUrl}" class="tiktok-video" loop playsinline></video>
                <div class="tiktok-overlay"><div class="tiktok-username">${escapeHtml(t.username)}</div><div>${escapeHtml(t.caption || '')}</div></div>
                <div class="tiktok-actions"><div class="tiktok-action" onclick="likeTiktok(${t.id})"><div>${likedTiktoks.has(t.id) ? '❤️' : '♡'}</div><div>${t.likes || 0}</div></div></div>
            </div>
        `).join('');
        setTimeout(() => { document.querySelectorAll('.tiktok-video').forEach(v => { v.play().catch(()=>{}); }); }, 100);
    }
    function likeTiktok(id) { const t = tiktoks.find(x => x.id == id); if (likedTiktoks.has(id)) { likedTiktoks.delete(id); t.likes--; } else { likedTiktoks.add(id); t.likes++; } saveAppData(); renderTiktokFeed(); }
    function openTiktokModal() { alert("Функция добавления тиктока — будет позже"); }

    function renderProfile() { const u = getCurrentUser(); if(!u) return; document.getElementById('profileContent').innerHTML = `<div class="profile-card" style="background:var(--card);border-radius:20px;padding:20px;text-align:center"><div class="profile-avatar-large">${u.avatar ? `<img src="${u.avatar}">` : '👤'}</div><h3>${escapeHtml(u.username)}</h3><div class="profile-stats"><div><div class="stat-value">${tiktoks.filter(t=>t.userId===u.email).length}</div><div>ТикТоков</div></div><div><div class="stat-value">${posts.filter(p=>p.userId===u.email).length}</div><div>Постов</div></div><div><div class="stat-value">${u.friends?.length||0}</div><div>Друзей</div></div></div><button class="btn" onclick="editUsername()">✏️ Сменить ник</button></div>`; }
    function editUsername() { const n = prompt("Новый ник:"); if(n?.trim()) { updateUserData({ username: n.trim() }); renderProfile(); renderFeed(); } }
    function renderDM() { document.getElementById('dmContent').innerHTML = '<div style="text-align:center;padding:40px">Личка в разработке</div>'; }
    function renderSettings() { document.getElementById('settingsContent').innerHTML = `<div class="settings-item"><span>🌙 Тема</span><div class="theme-switch ${currentTheme === 'dark' ? 'active' : ''}" id="themeToggle"><div class="theme-switch-knob"></div></div></div><div class="settings-item"><span>🚪 Выйти</span><button class="btn" onclick="doLogout()" style="background:#ff003c">Выход</button></div>`; document.getElementById('themeToggle')?.addEventListener('click', toggleTheme); }
    function doLogout() { logout(); location.reload(); }
    function toggleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    function applyTheme(theme) { currentTheme = theme; document.body.className = `theme-${theme}`; localStorage.setItem('hj_theme', theme); }
    function switchPage(pageId) { currentPage = pageId; document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(`${pageId}Page`).classList.add('active-page'); document.querySelectorAll('.nav-item').forEach(item => { if(item.dataset.page === pageId) item.classList.add('active'); else item.classList.remove('active'); }); if(pageId === 'tiktok') renderTiktokFeed(); if(pageId === 'feed') renderFeed(); if(pageId === 'profile') renderProfile(); if(pageId === 'dm') renderDM(); if(pageId === 'settings') renderSettings(); }
    function escapeHtml(s) { if(!s) return ''; return String(s).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    // ========== УПРАВЛЕНИЕ ЭКРАНАМИ ==========
    let pendingRegEmail = null;

    document.getElementById('showRegBtn').onclick = () => { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('regScreen').classList.remove('hidden'); };
    document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('regScreen').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); };
    document.getElementById('sendCodeBtn').onclick = () => {
        const email = document.getElementById('regEmail').value;
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;
        const error = startRegistration(email, username, password);
        if (error) { document.getElementById('regError').innerText = error; return; }
        pendingRegEmail = email;
        document.getElementById('codeEmailDisplay').innerText = email;
        document.getElementById('regScreen').classList.add('hidden');
        document.getElementById('codeScreen').classList.remove('hidden');
        document.getElementById('codeError').innerText = '';
        document.querySelectorAll('.code-digit').forEach((inp, i) => { inp.value = ''; if(i===0) inp.focus(); });
    };
    document.getElementById('resendCodeBtn').onclick = () => {
        if (!pendingRegEmail) return;
        const pending = pendingCodes[pendingRegEmail];
        if (pending) {
            const newCode = generateCode();
            pending.code = newCode;
            pending.expires = Date.now() + 5 * 60 * 1000;
            sendCodeToEmail(pendingRegEmail, newCode);
            document.getElementById('codeError').innerText = 'Новый код отправлен';
        } else {
            document.getElementById('codeError').innerText = 'Ошибка, начните регистрацию заново';
        }
    };
    document.getElementById('verifyCodeBtn').onclick = () => {
        const code = Array.from(document.querySelectorAll('.code-digit')).map(i => i.value).join('');
        if (code.length !== 6) { document.getElementById('codeError').innerText = 'Введите 6 цифр'; return; }
        const error = verifyCode(pendingRegEmail, code);
        if (error) { document.getElementById('codeError').innerText = error; return; }
        document.getElementById('codeScreen').classList.add('hidden');
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('loginError').innerText = 'Регистрация успешна! Войдите';
    };
    document.getElementById('loginBtn').onclick = () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const error = login(email, password);
        if (error) { document.getElementById('loginError').innerText = error; return; }
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appContainer').classList.add('active');
        applyTheme(currentTheme);
        switchPage('feed');
    };
    document.getElementById('topProfileBtn').onclick = () => switchPage('profile');
    document.getElementById('topSettingsBtn').onclick = () => switchPage('settings');
    document.getElementById('fabBtn').onclick = createTextPost;
    document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', () => switchPage(el.dataset.page)));

    // Авто-переключение между полями кода
    document.querySelectorAll('.code-digit').forEach((input, index, arr) => {
        input.addEventListener('input', (e) => { if(e.target.value.length === 1 && index < arr.length-1) arr[index+1].focus(); });
        input.addEventListener('keydown', (e) => { if(e.key === 'Backspace' && !e.target.value && index > 0) arr[index-1].focus(); });
    });

    if (currentSession && users[currentSession]) {
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('appContainer').classList.add('active');
        applyTheme(currentTheme);
        switchPage('feed');
    } else {
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('appContainer').classList.remove('active');
    }
</script>
</body>
</html>
